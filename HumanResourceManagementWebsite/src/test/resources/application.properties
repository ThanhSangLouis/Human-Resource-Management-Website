spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

security.jwt.secret=test-secret-key-for-jwt-signing-1234567890
security.jwt.expiration-ms=60000

hrm.attendance.daily-closing.enabled=false
