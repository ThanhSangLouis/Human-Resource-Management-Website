<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trợ lý AI – HRM System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/frags.js?v=4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(165deg, #eef1fb 0%, #f4f6fb 45%, #f8f9fd 100%);
      color: #1a2035;
      min-height: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e5e9f2;
      padding: 10px 24px;
      min-height: 56px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 20px;
      position: relative;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      flex-shrink: 0;
    }
    .topbar-logo { font-size: 18px; font-weight: 700; color: #2c3e8c; display: flex; align-items: center; gap: 8px; }
    .topbar-logo span.dot { color: #f5a623; }
    .topbar-nav { display: flex; gap: 28px; flex-wrap: wrap; }
    .topbar-nav a { text-decoration: none; color: #5a6a85; font-size: 14px; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; }
    .topbar-nav a.active, .topbar-nav a:hover { color: #2c3e8c; border-bottom-color: #2c3e8c; }
    .topbar-user { display: flex; align-items: center; gap: 12px; font-size: 14px; color: #5a6a85; margin-left: auto; }
    .avatar-circle { width: 36px; height: 36px; border-radius: 50%; background: #2c3e8c; color: #fff; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .btn-ghost { background: none; border: 1px solid #dde2ee; border-radius: 8px; padding: 9px 18px; font-size: 13.5px; font-weight: 500; color: #5a6a85; cursor: pointer; }
    .btn-ghost:hover { border-color: #2c3e8c; color: #2c3e8c; }
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e9f2; padding: 20px 0; flex-shrink: 0; overflow-y: auto; }
    .sidebar-section-title { font-size: 11px; font-weight: 700; color: #8a94a6; letter-spacing: .8px; text-transform: uppercase; padding: 0 20px 8px; margin-top: 16px; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 13.5px; color: #5a6a85; text-decoration: none; border-left: 3px solid transparent; }
    .sidebar-item:hover { background: #f0f4ff; color: #2c3e8c; }
    .sidebar-item.active { background: #eef2ff; color: #2c3e8c; font-weight: 600; border-left-color: #2c3e8c; }
    .main {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px 16px 16px;
      max-width: none;
      width: 100%;
    }
    .page-title { font-size: 12px; font-weight: 600; color: #8a94a6; letter-spacing: .35px; text-transform: uppercase; margin-bottom: 10px; flex-shrink: 0; }
    .card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e3e8f2;
      box-shadow: 0 4px 24px rgba(44, 62, 140, .08);
      overflow: hidden;
    }
    .card-head {
      flex-shrink: 0;
      background: linear-gradient(135deg, #2c3e8c 0%, #243878 55%, #1e2d6e 100%);
      padding: 16px 20px;
      color: #fff;
    }
    .card-head h1 { font-size: 17px; font-weight: 700; letter-spacing: -.02em; }
    .card-head p { font-size: 13px; opacity: .9; margin-top: 6px; line-height: 1.45; max-width: none; }
    .card-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 16px 18px 18px;
      gap: 12px;
    }
    #ai-log {
      flex: 1;
      min-height: 120px;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #e5e9f2;
      border-radius: 12px;
      padding: 14px 18px;
      background: linear-gradient(180deg, #fbfcff 0%, #f7f8fc 100%);
      font-size: 13.5px;
      line-height: 1.55;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
    }
    #ai-log::-webkit-scrollbar { width: 8px; }
    #ai-log::-webkit-scrollbar-thumb { background: #c9d2e6; border-radius: 8px; }
    #ai-log::-webkit-scrollbar-track { background: transparent; }
    .ai-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #8a94a6;
      padding: 32px 16px;
      gap: 8px;
    }
    .ai-empty strong { color: #5a6a85; font-size: 14px; }
    .bubble {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      animation: bubbleIn .22s ease-out;
    }
    .bubble.ai {
      max-width: 100%;
      align-self: stretch;
    }
    .bubble.user {
      max-width: min(100%, 520px);
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bubble.user {
      background: linear-gradient(135deg, #e8ecff, #dfe6ff);
      margin-left: auto;
      align-self: flex-end;
      text-align: right;
      border: 1px solid #d0d8f5;
      box-shadow: 0 2px 8px rgba(44, 62, 140, .08);
    }
    .bubble.ai {
      background: #fff;
      border: 1px solid #e8ecf4;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
    }
    .bubble .meta {
      font-size: 11px;
      color: #8a94a6;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed #e5e9f2;
    }
    .bubble.user .meta { border-top-color: #c8d0ef; }
    .ai-reply { color: #252b3d; }
    .ai-reply .ai-p { margin: 0 0 10px; }
    .ai-reply .ai-p:last-child { margin-bottom: 0; }
    .ai-reply .ai-h { font-size: 13px; font-weight: 700; color: #2c3e8c; margin: 12px 0 8px; letter-spacing: .02em; }
    .ai-reply .ai-h:first-child { margin-top: 0; }
    .ai-reply ul.ai-ul { margin: 6px 0 10px 1.1em; padding: 0; }
    .ai-reply ul.ai-ul li { margin: 4px 0; }
    .ai-reply .ai-form-block {
      background: #f6f8fd;
      border: 1px solid #e3e8f2;
      border-radius: 10px;
      padding: 10px 12px;
      margin: 8px 0 12px;
    }
    .ai-reply .ai-field {
      display: grid;
      grid-template-columns: minmax(100px, 38%) 1fr;
      gap: 8px 14px;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid #e8ecf4;
      font-size: 13px;
    }
    .ai-reply .ai-field:last-child { border-bottom: none; padding-bottom: 0; }
    .ai-reply .ai-field:first-of-type { padding-top: 0; }
    .ai-reply .ai-label {
      color: #5a6a85;
      font-weight: 600;
      font-size: 12px;
    }
    .ai-reply .ai-value { color: #1a2035; word-break: break-word; }
    .ai-reply strong { font-weight: 600; color: #1e2a4a; }
    .ai-reply .ai-md-heading {
      font-size: 13px;
      font-weight: 700;
      color: #2c3e8c;
      margin: 10px 0 6px;
      line-height: 1.4;
    }
    .ai-reply .ai-md-heading:first-child { margin-top: 0; }
    .ai-reply .ai-table-wrap {
      overflow-x: auto;
      margin: 8px 0 12px;
      border-radius: 10px;
      border: 1px solid #e3e8f2;
      background: #fafbfd;
    }
    .ai-reply table.ai-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      min-width: 520px;
    }
    .ai-reply table.ai-table th,
    .ai-reply table.ai-table td {
      border: 1px solid #e3e8f2;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    .ai-reply table.ai-table th {
      background: #eef2fa;
      color: #3d4a63;
      font-weight: 600;
      white-space: nowrap;
    }
    .ai-reply table.ai-table td {
      color: #1a2035;
      word-break: break-word;
    }
    .ai-reply table.ai-table tbody tr:nth-child(even) {
      background: #f6f8fd;
    }
    .composer-wrap {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .composer-hint { font-size: 11px; color: #8a94a6; }
    .composer-hint kbd {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      background: #eef1f7;
      border: 1px solid #dde2ee;
      font-size: 10px;
      font-family: inherit;
    }
    .row { display: flex; gap: 10px; align-items: flex-end; }
    textarea {
      width: 100%;
      min-height: 44px;
      max-height: 160px;
      padding: 11px 14px;
      border: 1px solid #dde2ee;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.45;
      resize: none;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus {
      outline: none;
      border-color: #2c3e8c;
      box-shadow: 0 0 0 3px rgba(44, 62, 140, .12);
    }
    .btn-primary {
      background: linear-gradient(180deg, #3548a8, #2c3e8c);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(44, 62, 140, .25);
      transition: transform .1s, opacity .15s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
    .err { color: #b91c1c; font-size: 13px; margin: 0; }
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a2035;
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      z-index: 400;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8a94a6;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes typingBounce {
      0%, 80%, 100% { opacity: .35; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }
    @media (max-width: 900px) {
      .sidebar { width: 200px; }
    }
    @media (max-width: 720px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e5e9f2; max-height: 160px; }
      .main { padding: 12px; }
    }
    .quick-prompts {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .quick-prompts-label {
      font-size: 11px;
      font-weight: 600;
      color: #8a94a6;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .quick-chip {
      appearance: none;
      border: 1px solid #d0d8ea;
      background: #f4f6fc;
      color: #2c3e8c;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      line-height: 1.3;
      transition: background .15s, border-color .15s, transform .1s;
      max-width: 100%;
      text-align: left;
    }
    .quick-chip:hover {
      background: #e8ecff;
      border-color: #2c3e8c;
    }
    .quick-chip:active {
      transform: scale(0.98);
    }
    .quick-chip:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>

<header class="topbar" id="topbar-placeholder"></header>
<div class="layout">
  <aside class="sidebar" id="navbar-placeholder"></aside>
  <main class="main">
    <div class="page-title">Trợ lý AI</div>
    <div class="card">
      <div class="card-head">
        <h1>Chat HR (Gemini)</h1>
        <p id="assistant-head-desc">Đang tải mô tả theo vai trò…</p>
      </div>
      <div class="card-body">
        <div id="ai-log" aria-live="polite">
          <div class="ai-empty" id="ai-empty">
            <strong>Bắt đầu hội thoại</strong>
            <span id="assistant-empty-hint">Chọn gợi ý nhanh hoặc gõ câu hỏi.</span>
          </div>
        </div>
        <div class="composer-wrap">
          <div class="quick-prompts">
            <span class="quick-prompts-label" id="assistant-quick-label">Gợi ý nhanh</span>
            <div class="quick-chips" id="ai-quick-chips" role="group" aria-label="Câu hỏi mẫu"></div>
          </div>
          <div class="row">
            <div style="flex:1;min-width:0;">
              <textarea id="ai-input" rows="2" placeholder=""></textarea>
            </div>
            <button type="button" class="btn-primary" id="ai-send">Gửi</button>
          </div>
          <p class="composer-hint"><kbd>Enter</kbd> gửi · <kbd>Shift</kbd>+<kbd>Enter</kbd> xuống dòng</p>
          <p class="err" id="ai-err" style="display:none;"></p>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast"></div>

<script>
(function () {
  const logEl = document.getElementById('ai-log');
  const emptyEl = document.getElementById('ai-empty');
  const input = document.getElementById('ai-input');
  const sendBtn = document.getElementById('ai-send');
  const errEl = document.getElementById('ai-err');
  const toast = document.getElementById('toast');
  const quickChips = document.getElementById('ai-quick-chips');
  const headDescEl = document.getElementById('assistant-head-desc');
  const emptyHintEl = document.getElementById('assistant-empty-hint');
  const quickLabelEl = document.getElementById('assistant-quick-label');

  /**
   * Mô tả + câu mẫu theo role (khớp intent classifier / RBAC backend).
   */
  var ASSISTANT_UI = {
    EMPLOYEE: {
      head:
        'Trợ lý giúp bạn xem chấm công, phép, thông báo và đọc quy định nội bộ. Chỉ truy cập dữ liệu của chính bạn — không đưa mật khẩu lên đây.',
      emptyHint:
        'Dùng gợi ý bên dưới hoặc gõ câu hỏi. Trả lời dựa trên dữ liệu và policy trong phạm vi nhân viên.',
      quickLabel: 'Gợi ý cho nhân viên',
      placeholder: 'Ví dụ: quy định nghỉ phép, chấm công hôm nay, tóm tắt thông báo…',
      chips: [
        { q: 'Quy định chấm công', label: 'Quy định chấm công' },
        { q: 'Chấm công hôm nay của tôi', label: 'Chấm công hôm nay' },
        { q: 'Phép năm của tôi còn bao nhiêu ngày?', label: 'Phép năm của tôi' },
        { q: 'Tóm tắt thông báo', label: 'Tóm tắt thông báo' },
        { q: 'Quy định nghỉ phép', label: 'Quy định nghỉ phép' },
        { q: 'Thông báo gần đây của tôi', label: 'Thông báo gần đây' }
      ]
    },
    MANAGER: {
      head:
        'Trợ lý hỗ trợ quản lý: xem đơn nghỉ chờ duyệt trong phạm vi team, tình hình đi muộn, tra cứu quy định, và dữ liệu cá nhân của bạn. Phạm vi team do hệ thống phân quyền.',
      emptyHint:
        'Ưu tiên hàng đợi duyệt và đi muộn team; có thể hỏi thêm quy định hoặc chấm công của chính bạn.',
      quickLabel: 'Gợi ý cho quản lý',
      placeholder:
        'Ví dụ: danh sách đơn chờ, đi muộn team, quy định phép, chấm công của tôi…',
      chips: [
        { q: 'Danh sách đơn chờ duyệt', label: 'Đơn chờ duyệt' },
        { q: 'Đi muộn team tháng này', label: 'Đi muộn team' },
        { q: 'Quy định nghỉ phép', label: 'Quy định nghỉ phép' },
        { q: 'Quy định chấm công', label: 'Quy định chấm công' },
        { q: 'Chấm công hôm nay của tôi', label: 'Chấm công của tôi' },
        { q: 'Phép năm của tôi còn bao nhiêu ngày?', label: 'Phép năm của tôi' }
      ]
    },
    HR: {
      head:
        'Trợ lý hỗ trợ HR: xem đơn nghỉ chờ xử lý, chấm công đi muộn (phạm vi rộng), tra cứu quy định nội bộ và chính sách. Chỉ dùng dữ liệu mà tài khoản được phép xem trên hệ thống.',
      emptyHint:
        'Phù hợp duyệt đơn, kiểm tra vi phạm giờ, và trả lời câu hỏi policy — không thay thế quyết định chính thức của HR.',
      quickLabel: 'Gợi ý cho HR',
      placeholder:
        'Ví dụ: đơn chờ duyệt toàn công ty, đi muộn tháng này, quy định phép…',
      chips: [
        { q: 'Danh sách đơn chờ duyệt', label: 'Đơn chờ duyệt' },
        { q: 'Đi muộn team tháng này', label: 'Đi muộn / team' },
        { q: 'Quy định nghỉ phép', label: 'Quy định nghỉ phép' },
        { q: 'Quy định chấm công', label: 'Quy định chấm công' },
        { q: 'Tóm tắt thông báo', label: 'Tóm tắt thông báo' },
        { q: 'Chấm công hôm nay của tôi', label: 'Chấm công của tôi (HR)' }
      ]
    },
    ADMIN: {
      head:
        'Trợ lý hỗ trợ Admin: tổng quan đơn chờ, chấm công vi phạm giờ, tra cứu policy và dữ liệu theo quyền quản trị. Thao tác nhạy cảm vẫn thực hiện trên màn hình nghiệp vụ chính.',
      emptyHint:
        'Dùng gợi ý để lọc nhanh; AI chỉ tóm tắt từ dữ liệu có sẵn, không tự sửa hệ thống.',
      quickLabel: 'Gợi ý cho Admin',
      placeholder:
        'Ví dụ: đơn chờ, đi muộn, quy định công ty, chấm công cá nhân…',
      chips: [
        { q: 'Danh sách đơn chờ duyệt', label: 'Đơn chờ duyệt' },
        { q: 'Đi muộn team tháng này', label: 'Đi muộn / team' },
        { q: 'Quy định chấm công', label: 'Quy định chấm công' },
        { q: 'Quy định nghỉ phép', label: 'Quy định nghỉ phép' },
        { q: 'Tóm tắt thông báo', label: 'Tóm tắt thông báo' },
        { q: 'Phép năm của tôi còn bao nhiêu ngày?', label: 'Phép năm (tài khoản tôi)' }
      ]
    }
  };

  function normalizeAssistantRole(role) {
    var r = String(role || '').trim().toUpperCase();
    if (r === 'MANAGER' || r === 'HR' || r === 'ADMIN' || r === 'EMPLOYEE') return r;
    return 'EMPLOYEE';
  }

  function applyAssistantRole(role) {
    var key = normalizeAssistantRole(role);
    var cfg = ASSISTANT_UI[key] || ASSISTANT_UI.EMPLOYEE;
    if (headDescEl) headDescEl.textContent = cfg.head;
    if (emptyHintEl) emptyHintEl.textContent = cfg.emptyHint;
    if (quickLabelEl) quickLabelEl.textContent = cfg.quickLabel;
    if (input) input.placeholder = cfg.placeholder || '';
    if (quickChips) {
      quickChips.innerHTML = '';
      (cfg.chips || []).forEach(function (c) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'quick-chip';
        b.setAttribute('data-q', c.q);
        b.textContent = c.label;
        b.title = c.q;
        quickChips.appendChild(b);
      });
    }
  }

  function debugMetaEnabled() {
    try {
      return new URLSearchParams(window.location.search).get('debug') === '1';
    } catch (e) {
      return false;
    }
  }

  function showErr(msg) {
    errEl.textContent = msg || '';
    errEl.style.display = msg ? 'block' : 'none';
  }

  function toastMsg(msg) {
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(function () { toast.style.display = 'none'; }, 3200);
  }

  function hideEmpty() {
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
  }

  function isMdTableSepLine(line) {
    var t = String(line || '').trim();
    if (t.length < 3 || t.indexOf('|') < 0) return false;
    if (t.indexOf('-') < 0 && t.indexOf(':') < 0) return false;
    return /^[\s|\-:]+$/.test(t);
  }

  function mdSplitTableRow(line) {
    var t = String(line || '').trim();
    if (t.charAt(0) !== '|') return null;
    var parts = t.split('|');
    if (parts.length < 2) return null;
    return parts.slice(1, parts.length - 1).map(function (c) {
      return c.trim();
    });
  }

  function renderMarkdownTableHtml(lines) {
    if (!lines || lines.length < 2) return null;
    var head = mdSplitTableRow(lines[0]);
    if (!head || head.length === 0) return null;
    if (!isMdTableSepLine(lines[1])) return null;
    var bodyRows = [];
    for (var r = 2; r < lines.length; r++) {
      var row = mdSplitTableRow(lines[r]);
      if (row && row.length > 0) bodyRows.push(row);
    }
    if (bodyRows.length === 0) return null;
    var ncol = head.length;
    function padRow(cells) {
      var out = cells.slice();
      while (out.length < ncol) out.push('');
      return out.slice(0, ncol);
    }
    var thead =
      '<thead><tr>' +
      head
        .map(function (h) {
          return '<th>' + h + '</th>';
        })
        .join('') +
      '</tr></thead>';
    var tbody =
      '<tbody>' +
      bodyRows
        .map(function (cells) {
          var pc = padRow(cells);
          return (
            '<tr>' +
            pc
              .map(function (x) {
                return '<td>' + x + '</td>';
              })
              .join('') +
            '</tr>'
          );
        })
        .join('') +
      '</tbody>';
    return (
      '<div class="ai-table-wrap"><table class="ai-table">' + thead + tbody + '</table></div>'
    );
  }

  /** Tìm bảng GFM (|...| + dòng ---) trong block; có thể có đoạn text phía trước. */
  function tryMarkdownTableFromBlock(block) {
    var lines = block.split('\n');
    var start = -1;
    for (var i = 0; i < lines.length - 1; i++) {
      var L = lines[i].trim();
      if (L.length > 0 && L.charAt(0) === '|' && L.charAt(L.length - 1) === '|') {
        if (isMdTableSepLine(lines[i + 1])) {
          start = i;
          break;
        }
      }
    }
    if (start < 0) return null;
    var before = lines.slice(0, start).join('\n').trim();
    var tableLines = lines.slice(start);
    var html = renderMarkdownTableHtml(tableLines);
    if (!html) return null;
    return { before: before, html: html };
  }

  /** Escape then light formatting: markdown-ish headings, **bold**, lists, paragraphs */
  function formatAiReply(raw) {
    var s = escapeHtml(String(raw || '—'));
    s = s.split('\n').map(function (line) {
      var hm = line.match(/^#{1,6}\s+(.+)$/);
      return hm ? ('<div class="ai-md-heading">' + hm[1] + '</div>') : line;
    }).join('\n');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    var blocks = s.split(/\n{2,}/);
    var out = [];
    for (var b = 0; b < blocks.length; b++) {
      var block = blocks[b].trim();
      if (!block) continue;
      if (/^<div class="ai-md-heading">/.test(block)) {
        out.push(block);
        continue;
      }
      var tbl = tryMarkdownTableFromBlock(block);
      if (tbl && tbl.html) {
        if (tbl.before) {
          out.push('<p class="ai-p">' + tbl.before.replace(/\n/g, '<br/>') + '</p>');
        }
        out.push(tbl.html);
        continue;
      }
      var lines = block.split('\n');
      var kvLines = [];
      var other = [];
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var m = line.match(/^\s*([^:\n]{1,120}):\s*(.*)$/);
        if (m && m[2] !== undefined && !/^\d+\.\s/.test(line.trim())) {
          kvLines.push({ label: m[1].trim(), value: m[2].trim() });
        } else {
          other.push(line);
        }
      }
      if (kvLines.length >= 2 && other.length === 0) {
        var rows = kvLines.map(function (kv) {
          return '<div class="ai-field"><span class="ai-label">' + kv.label + '</span><span class="ai-value">' + kv.value + '</span></div>';
        }).join('');
        out.push('<div class="ai-form-block">' + rows + '</div>');
        continue;
      }
      if (kvLines.length === 1 && other.length === 0) {
        var kv0 = kvLines[0];
        out.push('<div class="ai-form-block"><div class="ai-field"><span class="ai-label">' + kv0.label + '</span><span class="ai-value">' + kv0.value + '</span></div></div>');
        continue;
      }
      var listLines = [];
      var rest = [];
      for (var j = 0; j < lines.length; j++) {
        var ln = lines[j];
        var bullet = ln.match(/^\s*[-•*]\s+(.+)$/);
        var ordered = ln.match(/^\s*\d+[\.)]\s+(.+)$/);
        if (bullet) listLines.push({ t: 'b', html: bullet[1] });
        else if (ordered) listLines.push({ t: 'n', html: ordered[1] });
        else rest.push(ln);
      }
      if (listLines.length === lines.length && listLines.length > 0) {
        var lis = listLines.map(function (x) { return '<li>' + x.html + '</li>'; }).join('');
        out.push('<ul class="ai-ul">' + lis + '</ul>');
        continue;
      }
      var headMatch = lines[0].match(/^#{1,3}\s+(.+)$/);
      if (headMatch && lines.length > 1) {
        out.push('<div class="ai-h">' + headMatch[1] + '</div>');
        var body = lines.slice(1).join('\n').replace(/\n/g, '<br/>');
        out.push('<p class="ai-p">' + body + '</p>');
        continue;
      }
      var para = block.replace(/\n/g, '<br/>');
      out.push('<p class="ai-p">' + para + '</p>');
    }
    return '<div class="ai-reply">' + out.join('') + '</div>';
  }

  function appendBubble(role, html, meta) {
    hideEmpty();
    const d = document.createElement('div');
    d.className = 'bubble ' + (role === 'user' ? 'user' : 'ai');
    d.innerHTML = html + (meta ? '<div class="meta">' + meta + '</div>' : '');
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function appendTyping() {
    hideEmpty();
    const d = document.createElement('div');
    d.className = 'bubble ai';
    d.id = 'ai-typing-bubble';
    d.innerHTML = '<div class="typing-dots" aria-hidden="true"><span></span><span></span><span></span></div>';
    d.setAttribute('aria-busy', 'true');
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById('ai-typing-bubble');
    if (t) t.remove();
  }

  function autoResize() {
    input.style.height = 'auto';
    var h = Math.min(input.scrollHeight, 160);
    input.style.height = h + 'px';
  }

  function setQuickChipsDisabled(disabled) {
    if (!quickChips) return;
    quickChips.querySelectorAll('.quick-chip').forEach(function (b) {
      b.disabled = !!disabled;
    });
  }

  async function send() {
    const token = HRMFrags.getToken();
    if (!token) {
      HRMFrags.redirectLogin();
      return;
    }
    const text = (input.value || '').trim();
    if (!text) return;
    showErr('');
    appendBubble('user', escapeHtml(text).replace(/\n/g, '<br/>'), '');
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    setQuickChipsDisabled(true);
    appendTyping();
    try {
      const res = await fetch('/api/ai/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ message: text })
      });
      removeTyping();
      if (res.status === 401) {
        HRMFrags.redirectLogin();
        return;
      }
      const data = await res.json().catch(function () { return null; });
      if (!res.ok) {
        var msg = (data && data.message) ? data.message : ('Lỗi ' + res.status);
        showErr(msg);
        toastMsg(msg);
        return;
      }
      var replyHtml = formatAiReply(data.reply);
      var meta = '';
      if (debugMetaEnabled()) {
        meta = 'intent: ' + (data.intent || '—');
        if (data.fallback) meta += ' · fallback';
        if (data.citations && data.citations.length) {
          meta += ' · citations: ' + data.citations.map(function (c) { return c.source; }).join(', ');
        }
      }
      appendBubble('ai', replyHtml, meta);
    } catch (e) {
      removeTyping();
      showErr('Không gọi được API.');
      toastMsg('Lỗi mạng');
    } finally {
      sendBtn.disabled = false;
      setQuickChipsDisabled(false);
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.addEventListener('hrm:frags-ready', function (e) {
    if (!HRMFrags.getToken()) {
      HRMFrags.redirectLogin();
      return;
    }
    var r = e && e.detail && e.detail.role;
    if (!r) {
      var u = HRMFrags.getUser();
      r = u && u.role;
    }
    applyAssistantRole(r);
  });

  (function initAssistantRoleUi() {
    var u = HRMFrags.getUser();
    if (u && u.role) {
      applyAssistantRole(u.role);
    } else {
      applyAssistantRole('EMPLOYEE');
    }
  })();

  sendBtn.addEventListener('click', send);
  if (quickChips) {
    quickChips.addEventListener('click', function (e) {
      var btn = e.target.closest('.quick-chip');
      if (!btn || btn.disabled) return;
      var q = btn.getAttribute('data-q');
      if (!q) return;
      input.value = q;
      autoResize();
      send();
    });
  }
  input.addEventListener('input', autoResize);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  autoResize();
})();
</script>
</body>
</html>
