spring.application.name=HRMSystem
server.port=8081
# MySQL cloud configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hrm_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
security.jwt.secret=${JWT_SECRET:change-me-to-at-least-32-characters-secret-key-for-dev}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.refresh-token.max-age-seconds=${REFRESH_TOKEN_MAX_AGE_SECONDS:604800}
security.refresh-token.secure=${REFRESH_TOKEN_SECURE:false}

# Upload Avatar
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/avatars

# Đóng ngày chấm công (ABSENT + ON_LEAVE từ đơn đã duyệt), 00:15 hàng ngày
hrm.attendance.daily-closing.enabled=true

# ── Gmail SMTP (US17) — KHÔNG ghi App Password vào file; dùng biến môi trường MAIL_PASSWORD (16 ký tự, bỏ hết dấu cách)
# Ví dụ PowerShell: $env:MAIL_PASSWORD="nnqkckuxezonafbu"; $env:MAIL_SEND_ENABLED="true"
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:oneshop123vn@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nnqk ckux ezon afbu}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
# Nên trùng email gửi (Gmail hay từ chối nếu From giả mạo)
app.mail.from=${MAIL_FROM:oneshop123vn@gmail.com}
app.mail.send-enabled=${MAIL_SEND_ENABLED:true}
