spring.application.name=HRMSystem
server.port=8081
# MySQL local — set MYSQL_USER / MYSQL_PASSWORD for your machine (do not commit real passwords)
spring.datasource.url=jdbc:mysql://localhost:3306/hrm_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
# Neu MySQL root co mat khau: PowerShell truoc khi chay: $env:MYSQL_PASSWORD='matkhau'
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
security.jwt.secret=${JWT_SECRET:change-me-to-at-least-32-characters-secret-key-for-dev}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.refresh-token.max-age-seconds=${REFRESH_TOKEN_MAX_AGE_SECONDS:604800}
security.refresh-token.secure=${REFRESH_TOKEN_SECURE:false}
