spring.application.name=HRMSystem
server.port=8081
# MySQL cloud configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hrm_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
security.jwt.secret=${JWT_SECRET:change-me-to-at-least-32-characters-secret-key-for-dev}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.refresh-token.max-age-seconds=${REFRESH_TOKEN_MAX_AGE_SECONDS:604800}
security.refresh-token.secure=${REFRESH_TOKEN_SECURE:false}

# Upload Avatar
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/avatars

# Đóng ngày chấm công (ABSENT + ON_LEAVE từ đơn đã duyệt), 00:15 hàng ngày
hrm.attendance.daily-closing.enabled=true

# ── Gmail SMTP (US17) — chỉ bật khi đặt MAIL_SEND_ENABLED=true và MAIL_USERNAME / MAIL_PASSWORD
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:oneshop123vn@gmail.com}
spring.mail.password=${MAIL_PASSWORD:nnqk ckux ezon afbu}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=${MAIL_FROM:noreply@localhost}
app.mail.send-enabled=${MAIL_SEND_ENABLED:true}

# --- Gemini — key mặc định dưới đây; có thể ghi đè bằng biến môi trường GEMINI_API_KEY ---
gemini.api.key=${GEMINI_API_KEY:AIzaSyAaB62mbPaOioAAGtMxEBZF5gj_HaQstkY}
# Mặc định gemini-2.0-flash (ổn định, không "thinking"). Muốn 2.5: GEMINI_MODEL_NAME=gemini-2.5-flash (code đã tắt thinkingBudget).
gemini.model.name=${GEMINI_MODEL_NAME:gemini-2.0-flash}
gemini.max.tokens=${GEMINI_MAX_TOKENS:1000}
gemini.temperature=${GEMINI_TEMPERATURE:0.7}
ai.gemini.enabled=${AI_GEMINI_ENABLED:true}
ai.gemini.timeout-ms=${AI_GEMINI_TIMEOUT_MS:45000}
ai.leave.annual-days-default=${AI_LEAVE_ANNUAL_DEFAULT:12}
ai.chat.max-messages-per-minute=${AI_CHAT_MAX_MSG_PER_MIN:30}
# Tạo bảng ai_chat_audit khi ddl-auto=none (MySQL). Test: đặt ai.audit.auto-ddl=false.
ai.audit.auto-ddl=${AI_AUDIT_AUTO_DDL:true}
gemini.proxy.cache.enabled=${GEMINI_PROXY_CACHE_ENABLED:true}
gemini.proxy.cache.ttl-seconds=${GEMINI_PROXY_CACHE_TTL:120}
gemini.proxy.cache.max-entries=${GEMINI_PROXY_CACHE_MAX:256}
